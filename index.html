  const [done,setDone]=useState(false);
  const q=QUIZ[curr];
  function confirm(){if(sel===null)return;const correct=sel===q.ans;const nr=[...results,{correct,sel,q:curr}];setResults(nr);setConfirmed(true);if(curr===QUIZ.length-1)setTimeout(()=>{setDone(true);onComplete&&onComplete(nr);},1200);}
  function next(){setCurr(curr+1);setSel(null);setConfirmed(false);}
  if(done){
    const score=results.filter(r=>r.correct).length;const pct=Math.round(score/QUIZ.length*100);
    return(<div>
      <SH icon="🧠" title="Results" sub="Your quiz performance"/>
      <div style={{background:pct>=80?`linear-gradient(135deg,${B.teal},#2e7d5c)`:`linear-gradient(135deg,${B.accent},#c47b00)`,borderRadius:16,padding:28,textAlign:"center",marginBottom:24,color:"#fff"}}>
        <div style={{fontSize:56,marginBottom:10}}>{pct>=80?"🎉":pct>=60?"📚":"💪"}</div>
        <div style={{fontSize:36,fontWeight:900,marginBottom:6}}>{score}/{QUIZ.length}</div>
        <div style={{fontSize:16,opacity:.9}}>{pct}% — {pct>=80?"Excellent! You're ready to start.":pct>=60?"Good — review highlighted modules.":"Review the training guide again."}</div>
      </div>
      <div style={s.card(B.dark)}>{results.map((r,i)=>(<div key={i} style={{background:r.correct?"#d1e7dd":"#f8d7da",borderRadius:10,padding:"12px 14px",marginBottom:10}}><div style={{display:"flex",gap:8,alignItems:"flex-start"}}><span style={{fontSize:18}}>{r.correct?"✅":"❌"}</span><div><div style={{fontSize:13,fontWeight:700,color:r.correct?"#0f5132":"#842029",marginBottom:4}}>Q{i+1}: {QUIZ[i].q.slice(0,70)}...</div><div style={{fontSize:12,color:r.correct?"#0f5132":"#555"}}>{r.correct?"Correct!":"💡 "+QUIZ[i].exp}</div></div></div></div>))}</div>
      <button onClick={()=>{setCurr(0);setSel(null);setConfirmed(false);setResults([]);setDone(false);}} style={{...s.btn(B.dark),width:"100%"}}>Retake Quiz</button>
    </div>);
  }
  return(<div>
    <SH icon="🧠" title="Knowledge Quiz" sub={`Question ${curr+1} of ${QUIZ.length}`}/>
    <div style={{background:"#f0f0f0",borderRadius:99,height:8,marginBottom:24}}><div style={{background:`linear-gradient(to right,${B.dark},${B.light})`,borderRadius:99,height:8,width:`${(curr/QUIZ.length)*100}%`,transition:"width .4s"}}/></div>
    <div style={s.card(B.dark)}>
      <div style={{fontSize:15,fontWeight:700,color:B.dark,lineHeight:1.5,marginBottom:20}}>{q.q}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {q.opts.map((opt,i)=>{let bg="#f7f7f7",border="#e5e5e5",color="#333",fw=400;if(confirmed){if(i===q.ans){bg="#d1e7dd";border="#2e7d5c";color="#0f5132";fw=700;}else if(i===sel&&i!==q.ans){bg="#f8d7da";border=B.red;color="#842029";}}else if(sel===i){bg=B.dark+"18";border=B.dark;color=B.dark;fw=700;}return(<div key={i} onClick={()=>!confirmed&&setSel(i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:"12px 16px",cursor:confirmed?"default":"pointer",color,fontSize:14,fontWeight:fw,transition:"all .15s",display:"flex",gap:10,alignItems:"center"}}><span style={{width:26,height:26,background:border,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:800,flexShrink:0}}>{String.fromCharCode(65+i)}</span>{opt}</div>);})}
      </div>
      {confirmed&&(<div style={{background:sel===q.ans?"#d1e7dd":"#f8d7da",borderRadius:10,padding:"14px 16px",marginTop:14}}><div style={{fontSize:13,fontWeight:800,color:sel===q.ans?"#0f5132":"#842029",marginBottom:4}}>{sel===q.ans?"✅ Correct!":"❌ Not quite."}</div><div style={{fontSize:13,color:sel===q.ans?"#0f5132":"#555"}}>{q.exp}</div></div>)}
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
      {!confirmed?(<button onClick={confirm} disabled={sel===null} style={s.btn(sel===null?"#ccc":B.dark)}>{sel===null?"Select an answer":"Confirm Answer"}</button>):curr<QUIZ.length-1?(<button onClick={next} style={s.btn(B.dark)}>Next Question →</button>):(<button onClick={()=>setDone(true)} style={s.btn(B.teal)}>See Results 🎉</button>)}
    </div>
  </div>);
}

function App(){
  const [active,setActive]=useState("intro");
  const [visited,setVisited]=useState(new Set(["intro"]));
  const [quizDone,setQuizDone]=useState(false);
  const scrollRef=useRef(null);
  const currIdx=MODULES.findIndex(m=>m.id===active);
  function go(id){setActive(id);setVisited(v=>new Set([...v,id]));scrollRef.current?.scrollTo({top:0,behavior:"smooth"});}
  function next(){if(currIdx<MODULES.length-1)go(MODULES[currIdx+1].id);}
  function prev(){if(currIdx>0)go(MODULES[currIdx-1].id);}
  const SCREENS={intro:<IntroScreen/>,team:<TeamScreen/>,monday:<MondayScreen/>,flow:<FlowScreen/>,supervisors:<SupervisorsScreen/>,workers:<WorkersScreen/>,repairs:<RepairsScreen/>,logistics:<LogisticsScreen/>,schedule:<ScheduleScreen/>,rules:<RulesScreen/>,quiz:<QuizScreen onComplete={()=>setQuizDone(true)}/>};
  return(<div style={{display:"flex",flexDirection:"column",height:"100vh",background:B.cream,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
    <div style={{background:B.dark,padding:"12px 20px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Logo/><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Operations Training</div><div style={{fontSize:11,color:"rgba(255,255,255,.55)"}}>Schedule & Logistics Coordinator</div></div></div>
      <div><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,.65)",marginBottom:4}}><span>{visited.size}/{MODULES.length} modules visited</span><span>{Math.round(visited.size/MODULES.length*100)}%</span></div><div style={{background:"rgba(255,255,255,.15)",borderRadius:99,height:5}}><div style={{background:B.light,borderRadius:99,height:5,width:`${(visited.size/MODULES.length)*100}%`,transition:"width .5s"}}/></div></div>
    </div>
    <div style={{background:"#222",display:"flex",overflowX:"auto",flexShrink:0,scrollbarWidth:"none"}}>{MODULES.map(m=>(<button key={m.id} onClick={()=>go(m.id)} style={{background:active===m.id?m.color:"transparent",border:"none",color:active===m.id?"#fff":visited.has(m.id)?"rgba(255,255,255,.65)":"rgba(255,255,255,.35)",padding:"9px 14px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,borderBottom:active===m.id?"3px solid rgba(255,255,255,.4)":"3px solid transparent",transition:"all .18s",flexShrink:0}}><span>{m.icon}</span><span>{m.label}</span>{visited.has(m.id)&&active!==m.id&&<span style={{width:5,height:5,background:B.light,borderRadius:"50%"}}/>}</button>))}</div>
    <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"24px 18px 0"}}>
      {SCREENS[active]}
      <div style={{display:"flex",justifyContent:"space-between",padding:"24px 0 36px",gap:10}}>
        <button onClick={prev} disabled={currIdx===0} style={{...s.ghost(B.dark),opacity:currIdx===0?.3:1,cursor:currIdx===0?"not-allowed":"pointer"}}>← {currIdx>0?MODULES[currIdx-1].label:"Back"}</button>
        {currIdx<MODULES.length-1?(<button onClick={next} style={s.btn(MODULES[currIdx+1]?.color||B.dark)}>Next: {MODULES[currIdx+1].label} →</button>):(<div style={{background:quizDone?"#d1e7dd":"#f0f4ee",color:quizDone?"#0f5132":B.dark,borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700}}>{quizDone?"✅ Training Complete!":"Complete the quiz above ↑"}</div>)}
      </div>
    </div>
  </div>);
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
